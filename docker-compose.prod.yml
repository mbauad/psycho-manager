version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psycho-manager
    restart: always
    env_file:
      - .env
    networks:
      - psycho_supabase_default
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.psycho-manager.rule=Host(`psycho-manager.site`)"
      - "traefik.http.routers.psycho-manager.entrypoints=https"
      - "traefik.http.routers.psycho-manager.tls=true"
      - "traefik.http.routers.psycho-manager.tls.certresolver=letsencrypt"
      - "traefik.http.services.psycho-manager.loadbalancer.server.port=3000"
      - "traefik.http.routers.psycho-manager-http.rule=Host(`psycho-manager.site`)"
      - "traefik.http.routers.psycho-manager-http.entrypoints=http"
      - "traefik.http.routers.psycho-manager-http.middlewares=redirect-to-https"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  psycho_supabase_default:
    external: true
  easypanel:
    external: true
